<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MudNews — Article</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Syne:wght@400;600;700;800&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #0a0a0c;
    --surface:    #111116;
    --surface2:   #18181f;
    --border:     #252530;
    --border2:    #32323f;
    --text:       #e2e2e8;
    --muted:      #666672;
    --dim:        #44444f;
    --accent:     #7c6af7;
    --accent2:    #a594fa;
    --green:      #3ecf8e;
    --yellow:     #f5a623;
    --red:        #f05555;
    --blue:       #4da8f5;
    --fast:       #f05555;
    --moderate:   #f5a623;
    --slow:       #3ecf8e;
    --mono:       'IBM Plex Mono', monospace;
    --sans:       'Syne', sans-serif;
    --prose:      'IBM Plex Sans', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 15px; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* ── Scanline overlay ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.04) 2px,
      rgba(0,0,0,0.04) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  /* ── Header ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    background: rgba(10,10,12,0.95);
    backdrop-filter: blur(12px);
    z-index: 100;
  }

  .logo {
    font-family: var(--sans);
    font-weight: 800;
    font-size: 1.1rem;
    letter-spacing: -0.03em;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 0.5rem;
    text-decoration: none;
  }

  .logo-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 12px var(--accent); }
    50%       { opacity: 0.5; box-shadow: 0 0 4px var(--accent); }
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .btn-back {
    font-family: var(--mono);
    font-size: 0.75rem;
    padding: 0.35rem 0.9rem;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.15s;
    letter-spacing: 0.04em;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
  }
  .btn-back:hover { border-color: var(--accent); color: var(--accent2); }

  /* ── Loading ── */
  #loading-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    gap: 1rem;
    color: var(--muted);
    font-size: 0.82rem;
    letter-spacing: 0.06em;
  }

  .spinner-lg {
    width: 32px; height: 32px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Error ── */
  #error-state {
    display: none;
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
  }
  #error-state .icon { font-size: 2.5rem; margin-bottom: 1rem; opacity: 0.4; }
  #error-state p { font-size: 0.85rem; letter-spacing: 0.04em; }

  /* ── Article content ── */
  #article-content { display: none; }

  /* ── Article wrapper ── */
  .article-wrap {
    max-width: 760px;
    margin: 0 auto;
    padding: 2.5rem 2rem 6rem;
    animation: fadeUp 0.4s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: none; }
  }

  /* ── Article metadata bar ── */
  .article-meta-bar {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-bottom: 1.25rem;
    padding-bottom: 1.25rem;
    border-bottom: 1px solid var(--border);
  }

  .id-chip {
    font-family: var(--mono);
    font-size: 0.68rem;
    color: #7a7a8a;
    letter-spacing: 0.08em;
    padding: 0.15rem 0.45rem;
    border: 1px solid #32323f;
    border-radius: 3px;
    background: var(--surface);
    white-space: nowrap;
  }
  .id-chip::before { content: '#'; opacity: 0.7; }

  .score-badge {
    font-family: var(--mono);
    font-size: 0.7rem;
    font-weight: 600;
    padding: 0.15rem 0.5rem;
    border-radius: 3px;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  .score-high { background: rgba(124,106,247,0.2); color: var(--accent2); border: 1px solid rgba(124,106,247,0.3); }
  .score-mid  { background: rgba(77,168,245,0.15);  color: var(--blue);   border: 1px solid rgba(77,168,245,0.25); }
  .score-low  { background: rgba(102,102,114,0.15); color: var(--muted);  border: 1px solid var(--border); }

  .decay-badge {
    font-size: 0.65rem;
    font-weight: 500;
    padding: 0.15rem 0.45rem;
    border-radius: 3px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .decay-fast     { background: rgba(240,85,85,0.15);  color: var(--fast);     border: 1px solid rgba(240,85,85,0.25); }
  .decay-moderate { background: rgba(245,166,35,0.15); color: var(--moderate); border: 1px solid rgba(245,166,35,0.25); }
  .decay-slow     { background: rgba(62,207,142,0.15); color: var(--slow);     border: 1px solid rgba(62,207,142,0.25); }

  .category-tag { font-size: 0.65rem; color: #9090a0; letter-spacing: 0.04em; white-space: nowrap; }
  .age-tag      { font-size: 0.65rem; color: #7a7a8a; margin-left: auto;      white-space: nowrap; }

  /* ── Article title ── */
  .article-title {
    font-family: var(--sans);
    font-weight: 700;
    font-size: clamp(1.25rem, 3vw, 1.75rem);
    line-height: 1.25;
    letter-spacing: -0.02em;
    color: var(--text);
    margin-bottom: 1rem;
  }

  /* ── Summary callout ── */
  .summary-callout {
    background: rgba(124,106,247,0.07);
    border-left: 3px solid var(--accent);
    border-radius: 0 4px 4px 0;
    padding: 0.9rem 1.1rem;
    margin-bottom: 1.75rem;
    font-size: 0.85rem;
    line-height: 1.7;
    color: #b2b2c2;
    font-family: var(--mono);
    display: none;
  }
  .summary-callout.visible { display: block; }
  .summary-label {
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.4rem;
    display: block;
  }

  /* ── Hero image ── */
  .hero-image-wrap {
    margin-bottom: 1.75rem;
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: var(--surface2);
    position: relative;
  }
  .hero-image-wrap img {
    width: 100%;
    max-height: 420px;
    object-fit: cover;
    display: block;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  .hero-image-wrap img.loaded { opacity: 1; }
  .hero-caption {
    padding: 0.5rem 0.75rem;
    font-size: 0.7rem;
    color: var(--muted);
    border-top: 1px solid var(--border);
    line-height: 1.5;
  }

  /* ── Prose body ── */
  .article-body {
    font-family: var(--prose);
    font-size: 1rem;
    line-height: 1.8;
    color: #d0d0dc;
  }

  .article-body p {
    margin-bottom: 1.2em;
  }

  .article-body p:last-child { margin-bottom: 0; }

  /* ── Inline image gallery (after hero) ── */
  .inline-images {
    margin: 1.75rem 0;
    display: none;
  }
  .inline-images.has-images { display: block; }

  .inline-images-label {
    font-size: 0.65rem;
    color: var(--dim);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .inline-images-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .images-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 0.65rem;
  }

  .img-tile {
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: var(--surface2);
    cursor: pointer;
    transition: border-color 0.2s, transform 0.2s;
    position: relative;
  }
  .img-tile:hover { border-color: var(--border2); transform: translateY(-2px); }

  .img-tile img {
    width: 100%;
    aspect-ratio: 16 / 10;
    object-fit: cover;
    display: block;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  .img-tile img.loaded  { opacity: 1; }
  .img-tile img.errored { display: none; }

  .img-tile-skeleton {
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
  }
  .img-tile-skeleton.hidden { display: none; }
  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .img-tile-caption {
    padding: 0.4rem 0.55rem;
    font-size: 0.67rem;
    line-height: 1.4;
    color: var(--muted);
    border-top: 1px solid var(--border);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* ── Source / footer strip ── */
  .article-footer {
    margin-top: 2.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.75rem;
  }

  .footer-meta {
    font-size: 0.68rem;
    color: #7a7a8a;
    letter-spacing: 0.04em;
    flex: 1;
  }
  .footer-meta span { color: #9090a0; }

  .btn-source {
    font-family: var(--mono);
    font-size: 0.72rem;
    padding: 0.45rem 1rem;
    border: 1px solid rgba(77,168,245,0.35);
    background: rgba(77,168,245,0.07);
    color: var(--blue);
    border-radius: 4px;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    transition: all 0.15s;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    font-size: 0.68rem;
  }
  .btn-source:hover {
    background: rgba(77,168,245,0.15);
    border-color: var(--blue);
    box-shadow: 0 0 12px rgba(77,168,245,0.15);
  }

  /* ── Lightbox ── */
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 9000;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(8px);
    padding: 1rem;
    cursor: zoom-out;
  }
  #lightbox.open { display: flex; animation: lbIn 0.2s ease; }
  @keyframes lbIn { from { opacity: 0; } to { opacity: 1; } }

  #lightbox-img {
    max-width: 100%;
    max-height: 85vh;
    border-radius: 6px;
    box-shadow: 0 0 60px rgba(0,0,0,0.8);
    object-fit: contain;
    cursor: default;
  }

  #lightbox-caption {
    position: absolute;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.75rem;
    color: rgba(255,255,255,0.6);
    text-align: center;
    max-width: min(560px, 90vw);
    letter-spacing: 0.03em;
    line-height: 1.5;
    pointer-events: none;
  }

  #lightbox-close {
    position: absolute;
    top: 1rem; right: 1rem;
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--muted);
    font-size: 1rem;
    width: 32px; height: 32px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s, border-color 0.15s;
    z-index: 1;
  }
  #lightbox-close:hover { color: var(--text); border-color: var(--muted); }

  #lightbox-inner {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    cursor: default;
  }

  #lightbox-prev, #lightbox-next {
    flex: 0 0 auto;
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text);
    font-size: 1.4rem;
    width: 40px; height: 40px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    z-index: 1;
    user-select: none;
    line-height: 1;
  }
  #lightbox-prev:hover:not(:disabled),
  #lightbox-next:hover:not(:disabled) {
    background: var(--surface);
    border-color: var(--accent);
    color: var(--accent2);
  }
  #lightbox-prev:disabled,
  #lightbox-next:disabled { opacity: 0.2; cursor: default; border-color: var(--border); }

  #lightbox-counter {
    position: absolute;
    top: 1rem;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.7rem;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.08em;
    pointer-events: none;
  }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    header { padding: 0 1rem; }
    .article-wrap { padding: 1.5rem 1rem 4rem; }
    .images-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
  }
</style>
</head>
<body>

<header>
  <a href="/mudnews/app" class="logo">
    <div class="logo-dot"></div>
    MudNews
  </a>
  <div class="header-right">
    <a href="/mudnews/app" class="btn-back">← Back to feed</a>
  </div>
</header>

<div id="loading-state">
  <div class="spinner-lg"></div>
  <span>Loading article…</span>
</div>

<div id="error-state">
  <div class="icon">⚠</div>
  <p id="error-msg">Could not load article.</p>
</div>

<div id="article-content">
  <div class="article-wrap">

    <!-- metadata bar -->
    <div class="article-meta-bar" id="meta-bar"></div>

    <!-- title -->
    <h1 class="article-title" id="article-title"></h1>

    <!-- AI summary callout -->
    <div class="summary-callout" id="summary-callout">
      <span class="summary-label">AI Summary</span>
      <span id="summary-text"></span>
    </div>

    <!-- hero image (first image, if any) -->
    <div class="hero-image-wrap" id="hero-wrap" style="display:none">
      <img id="hero-img" src="" alt="">
      <div class="hero-caption" id="hero-caption" style="display:none"></div>
    </div>

    <!-- article prose -->
    <div class="article-body" id="article-body"></div>

    <!-- remaining images grid -->
    <div class="inline-images" id="inline-images">
      <div class="inline-images-label" id="inline-images-label"></div>
      <div class="images-grid" id="images-grid"></div>
    </div>

    <!-- footer: source + meta -->
    <div class="article-footer" id="article-footer"></div>

  </div>
</div>

<!-- Lightbox -->
<div id="lightbox" onclick="closeLightbox(event)">
  <button id="lightbox-close" onclick="closeLightbox()">✕</button>
  <div id="lightbox-inner">
    <button id="lightbox-prev" onclick="stepLightbox(-1)">&#8249;</button>
    <img    id="lightbox-img"  src="" alt="">
    <button id="lightbox-next" onclick="stepLightbox(1)">&#8250;</button>
  </div>
  <div id="lightbox-counter"></div>
  <div id="lightbox-caption"></div>
</div>

<script>
const BASE = '/mudnews';

// ── Lightbox state ────────────────────────────────────────────────────────────
let lbImages = [];
let lbIndex  = 0;

// ── Init ──────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const parts = window.location.pathname.split('/');
  const articleId = parts[parts.length - 1];
  if (!articleId || isNaN(Number(articleId))) {
    showError('Invalid article ID in URL.');
    return;
  }
  loadArticle(articleId);

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape')      closeLightbox();
    if (e.key === 'ArrowLeft')   stepLightbox(-1);
    if (e.key === 'ArrowRight')  stepLightbox(1);
  });
});

// ── Load article ──────────────────────────────────────────────────────────────
async function loadArticle(id) {
  try {
    const r = await fetch(`${BASE}/article-data/${id}`);
    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      showError(err.detail || `HTTP ${r.status}`);
      return;
    }
    const a = await r.json();
    renderArticle(a);
  } catch (e) {
    showError('Network error — could not load article.');
    console.error(e);
  }
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderArticle(a) {
  document.title = `MudNews — ${a.title}`;

  // ── meta bar ──
  const score     = a.ai_score || 0;
  const scoreClass = score >= 75 ? 'score-high' : score >= 50 ? 'score-mid' : 'score-low';
  const decay     = a.decay || 'moderate';
  const decayLabel = decay.charAt(0).toUpperCase() + decay.slice(1);
  const age       = timeAgo(a.created_at);

  document.getElementById('meta-bar').innerHTML = `
    <span class="id-chip">${a.article_id}</span>
    ${score ? `<span class="score-badge ${scoreClass}">Score ${Math.round(score)}</span>` : ''}
    <span class="decay-badge decay-${decay}">${decayLabel}</span>
    ${a.category ? `<span class="category-tag">${escHtml(a.category)}</span>` : ''}
    <span class="age-tag">${age}</span>
  `;

  // ── title ──
  document.getElementById('article-title').textContent = a.title;

  // ── AI summary callout ──
  if (a.const callout = document.getElementById('summary-callout');
    document.getElementById('summary-text').textContent = a.callout.classList.add('visible');
  }

  // ── images ──
  const images = Array.isArray(a.images) ? a.images.filter(img => img && img.url) : [];

  // hero = first image
  if (images.length > 0) {
    const hero = images[0];
    const heroWrap = document.getElementById('hero-wrap');
    const heroImg  = document.getElementById('hero-img');
    const heroCapEl = document.getElementById('hero-caption');
    heroWrap.style.display = '';
    heroImg.alt = hero.alt || '';
    heroImg.onload = () => heroImg.classList.add('loaded');
    heroImg.onerror = () => { heroWrap.style.display = 'none'; };
    heroImg.src = hero.url;
    if (hero.caption || hero.alt) {
      heroCapEl.textContent = hero.caption || hero.alt;
      heroCapEl.style.display = '';
    }
  }

  // ── prose body ──
  const body = document.getElementById('article-body');
  if (a.full_content && a.full_content.trim()) {
    // split into paragraphs on double-newlines (or single for pre-split content)
    const paras = a.full_content
      .split(/\n{2,}/)
      .map(s => s.trim())
      .filter(Boolean);

    body.innerHTML = paras.map(p =>
      `<p>${escHtml(p).replace(/\n/g, '<br>')}</p>`
    ).join('');
  } else {
    body.innerHTML = `<p style="color:var(--muted);font-size:0.85rem;font-style:italic;">Full article content not yet available. View the original source below.</p>`;
  }

  // ── remaining images grid (index 1+) ──
  const remainingImages = images.slice(1);
  if (remainingImages.length > 0) {
    lbImages = images; // lightbox uses ALL images
    const container = document.getElementById('inline-images');
    const grid      = document.getElementById('images-grid');
    const label     = document.getElementById('inline-images-label');

    label.textContent = `${remainingImages.length} more photograph${remainingImages.length !== 1 ? 's' : ''}`;
    container.classList.add('has-images');

    grid.innerHTML = remainingImages.map((img, i) => {
      const realIdx = i + 1; // offset by 1 (hero is index 0)
      const skId    = `skel-${realIdx}`;
      return `
        <div class="img-tile" onclick="openLightbox(${realIdx})">
          <div class="img-tile-skeleton" id="${skId}"></div>
          <img data-src="${escHtml(img.url || '')}"
               data-skel="${skId}"
               alt="${escHtml(img.alt || '')}">
          ${(img.caption || img.alt) ? `<div class="img-tile-caption">${escHtml(img.caption || img.alt)}</div>` : ''}
        </div>`;
    }).join('');

    // lazy load
    grid.querySelectorAll('img[data-src]').forEach(img => {
      const skelId = img.dataset.skel;
      img.onload = () => {
        img.classList.add('loaded');
        const skel = document.getElementById(skelId);
        if (skel) skel.classList.add('hidden');
      };
      img.onerror = () => {
        img.classList.add('errored');
        const skel = document.getElementById(skelId);
        if (skel) skel.classList.add('hidden');
        const tile = img.closest('.img-tile');
        if (tile) tile.style.display = 'none';
      };
      img.src = img.dataset.src;
    });
  } else {
    lbImages = images;
  }

  // ── footer ──
  const pubDate = a.published_at || a.created_at;
  document.getElementById('article-footer').innerHTML = `
    <div class="footer-meta">
      Article <span>#${a.article_id}</span>
      ${a.category ? ` · <span>${escHtml(a.category)}</span>` : ''}
      ${pubDate ? ` · ${formatDate(pubDate)}` : ''}
    </div>
    ${a.url ? `<a href="${escHtml(a.url)}" target="_blank" rel="noopener" class="btn-source">↗ Original source</a>` : ''}
  `;

  // show article, hide loading
  document.getElementById('loading-state').style.display = 'none';
  document.getElementById('article-content').style.display = 'block';
}

// ── Lightbox ──────────────────────────────────────────────────────────────────
function openLightbox(index) {
  lbIndex = index;
  renderLightbox();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function renderLightbox() {
  const img   = lbImages[lbIndex];
  const total = lbImages.length;
  document.getElementById('lightbox-img').src             = img.url || '';
  document.getElementById('lightbox-caption').textContent = img.caption || img.alt || '';
  document.getElementById('lightbox-counter').textContent = total > 1 ? `${lbIndex + 1} / ${total}` : '';
  document.getElementById('lightbox-prev').disabled = lbIndex === 0;
  document.getElementById('lightbox-next').disabled = lbIndex === total - 1;
}

function stepLightbox(dir) {
  const next = lbIndex + dir;
  if (next < 0 || next >= lbImages.length) return;
  lbIndex = next;
  renderLightbox();
}

function closeLightbox(e) {
  if (e) {
    const lb     = document.getElementById('lightbox');
    const close  = document.getElementById('lightbox-close');
    const inner  = document.getElementById('lightbox-inner');
    if (e.target !== lb && e.target !== close && e.target !== inner) return;
  }
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-img').src = '';
  document.body.style.overflow = '';
}

// ── Error ─────────────────────────────────────────────────────────────────────
function showError(msg) {
  document.getElementById('loading-state').style.display = 'none';
  const errEl = document.getElementById('error-state');
  errEl.style.display = 'block';
  document.getElementById('error-msg').textContent = msg;
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function timeAgo(iso) {
  if (!iso) return '';
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1)  return 'just now';
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ago`;
  const d = Math.floor(h / 24);
  return `${d}d ago`;
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' });
}
