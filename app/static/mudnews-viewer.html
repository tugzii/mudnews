<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MudNews</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #0a0a0c;
    --surface:    #111116;
    --surface2:   #18181f;
    --border:     #252530;
    --border2:    #32323f;
    --text:       #e2e2e8;
    --muted:      #666672;
    --dim:        #44444f;
    --accent:     #7c6af7;
    --accent2:    #a594fa;
    --green:      #3ecf8e;
    --green-dim:  #1a5c3f;
    --yellow:     #f5a623;
    --yellow-dim: #5c3d0a;
    --red:        #f05555;
    --red-dim:    #5c1a1a;
    --blue:       #4da8f5;
    --blue-dim:   #0d3a5c;
    --fast:       #f05555;
    --moderate:   #f5a623;
    --slow:       #3ecf8e;
    --mono:       'IBM Plex Mono', monospace;
    --sans:       'Syne', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { font-size: 15px; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* ── Scanline overlay ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.04) 2px,
      rgba(0,0,0,0.04) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  /* ── Header ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    background: rgba(10,10,12,0.95);
    backdrop-filter: blur(12px);
    z-index: 100;
  }

  .logo {
    font-family: var(--sans);
    font-weight: 800;
    font-size: 1.1rem;
    letter-spacing: -0.03em;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .logo-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 12px var(--accent); }
    50%       { opacity: 0.5; box-shadow: 0 0 4px var(--accent); }
  }

  .header-controls {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  /* Username chip shown next to sign-out */
  .user-chip {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.04em;
    display: flex;
    align-items: center;
    gap: 0.35rem;
    padding: 0.35rem 0.7rem;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--surface);
    white-space: nowrap;
    /* hidden until we have a name */
    display: none;
  }
  .user-chip.visible { display: flex; }
  .user-chip::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
  }

  .btn-logout {
    font-family: var(--mono);
    font-size: 0.75rem;
    padding: 0.35rem 0.9rem;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.15s;
    letter-spacing: 0.04em;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
  }
  .btn-logout:hover { border-color: var(--red); color: var(--red); }

  /* ── Tabs ── */
  .sticky-nav {
    position: sticky;
    top: 56px;
    z-index: 90;
    background: rgba(17,17,22,0.97);
    backdrop-filter: blur(12px);
    box-shadow: 0 1px 0 var(--border);
    display: flex;
    align-items: center;
  }
  .tabs {
    flex: 1;
    display: flex;
    gap: 0;
    padding: 0 2rem;
    background: transparent;
  }
  .tabs-right {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0 1.5rem;
    flex-shrink: 0;
  }

  .tab {
    font-family: var(--mono);
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.85rem 1.5rem;
    border: none;
    background: none;
    color: var(--muted);
    cursor: pointer;
    position: relative;
    transition: color 0.15s;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
  }
  .tab:hover { color: var(--text); }
  .tab.active {
    color: var(--accent2);
    border-bottom-color: var(--accent);
  }

  .tab-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--accent);
    color: #fff;
    font-size: 0.65rem;
    font-weight: 600;
    min-width: 18px;
    height: 18px;
    border-radius: 9px;
    padding: 0 5px;
    margin-left: 0.5rem;
    vertical-align: middle;
    transition: background 0.2s;
  }

  /* ── Toolbar ── */
  .toolbar {
    padding: 0.75rem 2rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    border-bottom: 1px solid var(--border);
    background: transparent;
    flex-wrap: wrap;
  }

  .mode-toggle {
    display: flex;
    border: 1px solid var(--border2);
    border-radius: 4px;
    overflow: hidden;
  }

  .mode-btn {
    font-family: var(--mono);
    font-size: 0.75rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 0.35rem 0.9rem;
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .mode-btn.active { background: var(--accent); color: #fff; }
  .mode-btn:not(.active):hover { background: var(--surface2); color: var(--text); }

  .toolbar-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .btn-refresh {
    font-family: var(--mono);
    font-size: 0.75rem;
    padding: 0.35rem 0.9rem;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.15s;
    letter-spacing: 0.04em;
  }
  .btn-refresh:hover { border-color: var(--accent); color: var(--accent2); }
  .btn-refresh:disabled { opacity: 0.4; cursor: default; }

  .status-text {
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.04em;
  }

  /* ── Main layout ── */
  main {
    max-width: 860px;
    margin: 0 auto;
    padding: 1.5rem 2rem 4rem;
  }

  /* ── Panel visibility ── */
  .panel { display: none; }
  .panel.active { display: block; }

  /* ── Empty state ── */
  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 2.5rem; margin-bottom: 1rem; opacity: 0.4; }
  .empty-state p { font-size: 0.85rem; letter-spacing: 0.04em; }

  /* ── Loading spinner ── */
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 0.5rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Article card ── */
  .article-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 1rem;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.15s;
    animation: slideIn 0.3s ease both;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .article-card:hover { border-color: var(--border2); }

  .article-card.fading {
    transition: opacity 0.3s, transform 0.3s, max-height 0.4s, margin 0.4s, padding 0.4s;
    opacity: 0;
    transform: translateX(20px);
  }

  /* ── History card: identical to queue, just slightly dimmed ── */
  /* Removed all font/size overrides — history-card only dims opacity */
  .history-card { opacity: 0.88; }

  .sr-only{position:absolute;width:1px;height:1px;padding:0;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
  .card-header {
    cursor: pointer;
    padding: 1rem 1.25rem 0.75rem;
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
  }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-bottom: 0.5rem;
  }

  .score-badge {
    font-family: var(--mono);
    font-size: 0.7rem;
    font-weight: 600;
    padding: 0.15rem 0.5rem;
    border-radius: 3px;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  .score-high { background: rgba(124,106,247,0.2); color: var(--accent2); border: 1px solid rgba(124,106,247,0.3); }
  .score-mid  { background: rgba(77,168,245,0.15);  color: var(--blue);   border: 1px solid rgba(77,168,245,0.25); }
  .score-low  { background: rgba(102,102,114,0.15); color: var(--muted);  border: 1px solid var(--border); }

  .decay-badge {
    font-size: 0.65rem;
    font-weight: 500;
    padding: 0.15rem 0.45rem;
    border-radius: 3px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .decay-fast     { background: rgba(240,85,85,0.15);  color: var(--fast);     border: 1px solid rgba(240,85,85,0.25); }
  .decay-moderate { background: rgba(245,166,35,0.15); color: var(--moderate); border: 1px solid rgba(245,166,35,0.25); }
  .decay-slow     { background: rgba(62,207,142,0.15); color: var(--slow);     border: 1px solid rgba(62,207,142,0.25); }

  .category-tag { font-size: 0.65rem; color: #9090a0; letter-spacing: 0.04em; white-space: nowrap; }
  .age-tag      { font-size: 0.65rem; color: #7a7a8a; margin-left: auto;      white-space: nowrap; }

  /* ── Article ID chip ── */
  .id-chip {
    font-family: var(--mono);
    font-size: 0.63rem;
    color: #7a7a8a;
    letter-spacing: 0.07em;
    padding: 0.1rem 0.38rem;
    border: 1px solid #32323f;
    border-radius: 3px;
    background: var(--surface2);
    white-space: nowrap;
    opacity: 1;
  }
  .id-chip::before { content: '#'; opacity: 0.7; }

  /* ── Card title: single definition, used by both queue and history ── */
  .card-desc {
    font-size: 0.78rem;
    color: var(--dim);
    font-style: italic;
    margin: 0.4rem 0 -0.25rem;
    line-height: 1.35;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-title {
    font-family: var(--mono);
    font-weight: 500;
    font-size: 0.72rem;
    line-height: 1.35;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    display: inline-block;
    /* color: var(--yellow);
    background: rgba(245,166,35,0.08);
    border: 1px solid rgba(245,166,35,0.25); */
    color: #e09928;
    background: rgba(245,166,35,0.07);
    border: 1px solid rgba(245,166,35,0.22);
    border-radius: 4px;
    padding: 0.2rem 0.55rem;
    margin-top: 0.15rem;
    /* no font-size or opacity overrides anywhere below */
  }

  .card-body { padding: 0 1.25rem 0; }

  .card-summary {
    font-size: 0.82rem;
    line-height: 1.7;
    color: #b2b2c2;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
    cursor: pointer;
  }
  .card-summary.expanded { display: block; overflow: visible; }

  /* History summary: same clamp as queue (3 lines), was 2 before — unified */
  .history-card .card-summary:not(.expanded) { -webkit-line-clamp: 3; }

  .card-full-content {
    display: none;
    font-size: 0.82rem;
    line-height: 1.7;
    color: #b2b2c2;
    padding: 0.5rem 0 0.25rem;
    border-top: 1px solid rgba(255,255,255,0.06);
    margin-top: 0.5rem;
  }
  .card-full-content p { margin: 0 0 0.6rem; }
  .card-full-content p:last-child { margin-bottom: 0; }

  .expand-hint {
    font-size: 0.68rem;
    color: var(--muted);
    cursor: pointer;
    letter-spacing: 0.04em;
    margin-top: 0.3rem;
    display: block;
  }
  .expand-hint:hover { color: var(--accent2); }

  /* ── Image gallery ── */
  .card-images {
    margin-top: 1rem;
    display: none;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.3s ease, transform 0.3s ease;
  }
  .card-images.visible  { display: block; opacity: 1; transform: translateY(0); }
  .card-images.animating { display: block; }

  .images-strip-wrap {
    position: relative;
    display: flex;
    align-items: center;
    gap: 0;
  }

  .strip-arrow {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--text);
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
    line-height: 1;
    flex-shrink: 0;
    z-index: 2;
  }
  .strip-arrow:hover:not(:disabled) {
    background: var(--surface);
    border-color: var(--accent);
    color: var(--accent2);
  }
  .strip-arrow:disabled {
    opacity: 0.2;
    cursor: default;
    border-color: var(--border);
  }
  .strip-arrow-prev { margin-right: 0.4rem; }
  .strip-arrow-next { margin-left:  0.4rem; }

  .images-scroll {
    flex: 1 1 0;
    min-width: 0;
    display: flex;
    gap: 0.65rem;
    overflow-x: scroll;
    padding: 0 0 0.75rem 0;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: thick;
    scrollbar-color: var(--muted) var(--surface2);
    scroll-behavior: smooth;
  }
  .images-scroll::-webkit-scrollbar       { height: 12px; display: block; }
  .images-scroll::-webkit-scrollbar-track { background: var(--surface2); border-radius: 4px; margin: 0 4px; }
  .images-scroll::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 4px; border: 2px solid var(--surface2); }
  .images-scroll::-webkit-scrollbar-thumb:hover { background: var(--accent2); }

  .img-item {
    flex: 0 0 auto;
    scroll-snap-align: start;
    width: clamp(180px, 55vw, 260px);
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: var(--surface2);
    position: relative;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.2s;
  }
  .img-item:hover { border-color: var(--border2); transform: translateY(-2px); }

  .img-item img {
    width: 100%;
    aspect-ratio: 16 / 10;
    object-fit: cover;
    display: block;
    background: var(--surface2);
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  .img-item img.loaded  { opacity: 1; }
  .img-item img.errored { display: none; }

  .img-skeleton {
    width: 100%;
    aspect-ratio: 16 / 10;
    background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    position: absolute;
    top: 0; left: 0;
    border-radius: 4px 4px 0 0;
  }
  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  .img-skeleton.hidden { display: none; }

  .img-caption {
    padding: 0.45rem 0.6rem;
    font-size: 0.67rem;
    line-height: 1.4;
    color: var(--muted);
    border-top: 1px solid var(--border);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .images-count-hint {
    font-size: 0.65rem;
    color: var(--dim);
    letter-spacing: 0.04em;
    margin-bottom: 0.5rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .images-count-hint::before {
    content: '';
    display: inline-block;
    width: 10px; height: 1px;
    background: var(--border2);
  }

  /* ── Lightbox ── */
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 9000;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(8px);
    padding: 1rem;
    cursor: zoom-out;
  }
  #lightbox.open { display: flex; animation: lbIn 0.2s ease; }
  @keyframes lbIn { from { opacity: 0; } to { opacity: 1; } }

  #lightbox-img {
    display: block;
    max-width: 100%;
    max-height: 85vh;
    border-radius: 6px;
    box-shadow: 0 0 60px rgba(0,0,0,0.8);
    object-fit: contain;
    cursor: default;
  }

  #lightbox-caption {
    position: absolute;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.75rem;
    color: rgba(255,255,255,0.6);
    text-align: center;
    max-width: min(560px, 90vw);
    letter-spacing: 0.03em;
    line-height: 1.5;
    pointer-events: none;
  }

  #lightbox-close {
    position: absolute;
    top: 1rem; right: 1rem;
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--muted);
    font-size: 1rem;
    width: 32px; height: 32px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s, border-color 0.15s;
    z-index: 1;
  }
  #lightbox-close:hover { color: var(--text); border-color: var(--muted); }

  #lightbox-inner {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: default;
  }

  /* Image sits in a fixed-width slot so the centre never moves between photos.
     The slot width is set via JS once all images are preloaded. */
  #lightbox-img-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Arrows are absolutely positioned relative to #lightbox-inner so they
     never shift regardless of which photo is showing. */
  #lightbox-prev,
  #lightbox-next {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text);
    font-size: 1.4rem;
    width: 40px; height: 40px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    z-index: 1;
    user-select: none;
    line-height: 1;
  }
  #lightbox-prev { left: 0; }
  #lightbox-next { right: 0; }

  #lightbox-prev:hover:not(:disabled),
  #lightbox-next:hover:not(:disabled) {
    background: var(--surface);
    border-color: var(--accent);
    color: var(--accent2);
  }
  #lightbox-prev:disabled,
  #lightbox-next:disabled {
    opacity: 0.2;
    cursor: default;
    border-color: var(--border);
  }

  #lightbox-counter {
    position: absolute;
    top: 1rem;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.7rem;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.08em;
    pointer-events: none;
  }

  /* ── Card footer ── */
  .card-footer {
    padding: 0.75rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-top: 0.75rem;
    border-top: 1px solid var(--border);
  }

  /* ── Action buttons ── */
  .btn-action {
    font-family: var(--mono);
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 0.4rem 0.9rem;
    border-radius: 4px;
    border: 1px solid;
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
  }
  .btn-action:disabled { opacity: 0.4; cursor: default; }

  .btn-read {
    background: rgba(62,207,142,0.1);
    border-color: rgba(62,207,142,0.35);
    color: var(--green);
  }
  .btn-read:hover:not(:disabled) {
    background: rgba(62,207,142,0.2);
    border-color: var(--green);
    box-shadow: 0 0 12px rgba(62,207,142,0.2);
  }

  .btn-skip {
    background: rgba(102,102,114,0.12);
    border-color: rgba(102,102,114,0.35);
    color: var(--muted);
  }
  .btn-skip:hover:not(:disabled) { background: rgba(102,102,114,0.22); border-color: var(--muted); color: var(--text); }

  .btn-decline {
    background: rgba(240,85,85,0.08);
    border-color: rgba(240,85,85,0.25);
    color: var(--red);
  }
  .btn-decline:hover:not(:disabled) { background: rgba(240,85,85,0.18); border-color: var(--red); }

  .btn-url {
    font-size: 0.68rem;
    color: var(--muted);
    text-decoration: none;
    letter-spacing: 0.04em;
    padding: 0.35rem 0.6rem;
    border: 1px solid var(--border);
    border-radius: 4px;
    transition: all 0.15s;
    font-family: var(--mono);
  }
  .btn-url:hover { color: var(--blue); border-color: var(--blue); }

  .footer-id-chip {
    font-family: var(--mono);
    font-size: 0.63rem;
    color: #7a7a8a;
    letter-spacing: 0.06em;
    margin-left: auto;
    padding: 0.1rem 0;
    white-space: nowrap;
    user-select: all;
  }

  .btn-full-article {
    font-family: var(--mono);
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 0.4rem 0.9rem;
    border-radius: 4px;
    border: 1px solid rgba(124,106,247,0.3);
    background: rgba(124,106,247,0.07);
    color: var(--accent2);
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
  }
  .btn-full-article:hover:not(:disabled) {
    background: rgba(124,106,247,0.16);
    border-color: var(--accent);
    box-shadow: 0 0 10px rgba(124,106,247,0.18);
  }
  .btn-full-article:disabled { opacity: 0.4; cursor: default; }

  /* ── Speed Read button ── */
  .btn-speed-read {
    font-family: var(--mono);
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 0.4rem 0.9rem;
    border-radius: 4px;
    border: 1px solid rgba(255,80,80,0.3);
    background: rgba(255,80,80,0.07);
    color: #ff6b6b;
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
  }
  .btn-speed-read:hover {
    background: rgba(255,80,80,0.16);
    border-color: rgba(255,80,80,0.7);
    box-shadow: 0 0 10px rgba(255,80,80,0.18);
  }
  #sr-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.96);
    z-index: 9100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(12px);
  }
  #sr-modal.open { display: flex; }
  #sr-word-display {
    font-weight: 600;
    letter-spacing: 0.02em;
    color: #fff;
    min-height: 1.4em;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    font-family: var(--mono); /* monospace so every char is same width */
    width: min(700px, 90vw);
  }
  /* Three columns: left text right-aligned | ORP letter centred | right text left-aligned.
     The ORP column is always at the visual centre of the display area. */
  #sr-left  { flex: 1; text-align: right; color: #fff; }
  #sr-orp   { flex: 0 0 auto; color: #ff4444; text-align: center; }
  #sr-right { flex: 1; text-align: left;  color: #fff; }
  #sr-progress-wrap {
    position: relative;
    width: min(560px, 88vw);
    height: 20px;           /* tall hit area for easy clicking */
    display: flex;
    align-items: center;
    cursor: pointer;
    user-select: none;
  }
  #sr-progress-track {
    position: absolute;
    left: 0; right: 0;
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: hidden;
  }
  #sr-progress-bar {
    height: 100%;
    background: #ff4444;
    width: 0%;
    transition: width 0.08s linear;
    border-radius: 2px;
  }
  #sr-progress-knob {
    position: absolute;
    width: 14px; height: 14px;
    background: #ff4444;
    border: 2px solid #fff;
    border-radius: 50%;
    left: 0%;
    transform: translateX(-50%);
    transition: left 0.08s linear, transform 0.15s, box-shadow 0.15s;
    cursor: grab;
    box-shadow: 0 0 6px rgba(255,68,68,0.5);
    z-index: 1;
  }
  #sr-progress-knob:active { cursor: grabbing; transform: translateX(-50%) scale(1.3); }
  #sr-progress-wrap:hover #sr-progress-knob { box-shadow: 0 0 12px rgba(255,68,68,0.8); }
  #sr-controls {
    display: flex;
    align-items: center;
    gap: 1.2rem;
    flex-wrap: wrap;
    justify-content: center;
  }
  #sr-controls button {
    font-family: var(--mono);
    font-size: 0.8rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 0.5rem 1.2rem;
    border-radius: 4px;
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
  }
  #sr-controls button:hover { border-color: var(--muted); background: var(--surface); }
  #sr-play-btn { border-color: rgba(255,80,80,0.4) !important; color: #ff6b6b !important; }
  #sr-play-btn:hover { background: rgba(255,80,80,0.1) !important; }
  #sr-wpm-wrap {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--muted);
  }
  #sr-wpm-slider { width: 120px; accent-color: #ff4444; }
  #sr-wpm-label { color: #ff6b6b; min-width: 4ch; }
  #sr-font-wrap {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--muted);
  }
  #sr-font-slider { width: 100px; accent-color: #ff4444; }
  #sr-font-label  { color: #ff6b6b; min-width: 3ch; }
  #sr-status {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: rgba(255,255,255,0.25);
    letter-spacing: 0.08em;
  }
  #sr-inner {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2rem;
    padding: 2.5rem 2rem 2rem;
    border: 1px solid var(--border2);
    border-radius: 12px;
    background: rgba(255,255,255,0.02);
  }
  #sr-close {
    position: absolute;
    top: 0.6rem; right: 0.6rem;
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--muted);
    font-size: 1rem;
    width: 32px; height: 32px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s, border-color 0.15s;
    z-index: 1;
  }
  #sr-close:hover { color: var(--text); border-color: var(--muted); }

  /* ── Explore tab ── */
  .explore-search-wrap {
    padding: 1rem 2rem 0.5rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .explore-search-row {
    display: flex;
    gap: 0.5rem;
    align-items: center;
  }
  .explore-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 0.55rem 0.85rem;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.15s, width 0.2s;
  }
  .explore-input::placeholder { color: var(--dim); }
  .explore-input:focus { border-color: var(--accent); }
  .explore-go-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 0.55rem 1.1rem;
    font-family: var(--mono);
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  .explore-go-btn:hover { opacity: 0.85; }
  .explore-go-btn:disabled { opacity: 0.45; cursor: default; }
  .explore-clear-btn {
    background: none;
    border: 1px solid var(--border2);
    border-radius: 6px;
    color: var(--muted);
    padding: 0.5rem 0.65rem;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 0.8rem;
    transition: color 0.15s;
  }
  .explore-clear-btn:hover { color: var(--text); }
  .explore-meta {
    margin-top: 0.45rem;
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.03em;
    min-height: 1.1em;
  }
  /* ── History tab search ── */
  .history-search-wrap {
    padding: 0.75rem 2rem 0.5rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .history-search-row {
    display: flex;
    gap: 0.5rem;
    align-items: center;
  }
  .history-search-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 0.55rem 0.85rem;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.15s;
  }
  .history-search-input::placeholder { color: var(--dim); }
  .history-search-input:focus { border-color: var(--accent); }
  .history-search-clear {
    background: none;
    border: 1px solid var(--border2);
    border-radius: 6px;
    color: var(--muted);
    padding: 0.5rem 0.65rem;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 0.8rem;
    transition: color 0.15s;
  }
  .history-search-clear:hover { color: var(--text); }
  .history-search-meta {
    margin-top: 0.35rem;
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.03em;
    min-height: 1.1em;
  }
  /* Explore result card */
  .explore-card {
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    padding: 1rem 1.25rem;
    margin-bottom: 0.75rem;
    transition: border-color 0.15s;
  }
  .explore-card:hover { border-color: var(--border2); }
  .explore-card.in-queue-card {
    border-color: rgba(124,106,247,0.3);
    background: rgba(124,106,247,0.03);
  }
  .explore-card.is-rescued {
    border-color: rgba(62,207,142,0.35);
    background: rgba(62,207,142,0.04);
  }
  .explore-card-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    align-items: center;
    margin-bottom: 0.45rem;
  }
  .explore-card-title {
    font-family: var(--sans);
    font-weight: 700;
    font-size: 0.97rem;
    color: var(--text);
    margin-bottom: 0.35rem;
    line-height: 1.35;
  }
  .explore-card-desc {
    font-size: 0.8rem;
    color: var(--muted);
    line-height: 1.55;
    margin-bottom: 0.6rem;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .explore-card-reason {
    font-size: 0.75rem;
    color: var(--dim);
    font-style: italic;
    border-left: 2px solid var(--border2);
    padding-left: 0.6rem;
    margin-bottom: 0.65rem;
    line-height: 1.5;
  }
  .explore-card-footer {
    display: flex;
    gap: 0.5rem;
    align-items: center;
    flex-wrap: wrap;
  }
  .rescued-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.25rem;
    background: rgba(62,207,142,0.15);
    color: var(--green);
    border: 1px solid rgba(62,207,142,0.35);
    border-radius: 4px;
    padding: 0.18rem 0.5rem;
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .interaction-badge {
    display: inline-flex;
    align-items: center;
    font-size: 0.68rem;
    padding: 0.18rem 0.5rem;
    border-radius: 4px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .interaction-badge.read     { background: rgba(62,207,142,0.12); color: var(--green);  border: 1px solid rgba(62,207,142,0.25); }
  .interaction-badge.skipped  { background: rgba(245,166,35,0.12);  color: var(--yellow); border: 1px solid rgba(245,166,35,0.25); }
  .interaction-badge.declined { background: rgba(240,85,85,0.12);   color: var(--red);    border: 1px solid rgba(240,85,85,0.25); }
  .btn-rescue {
    background: rgba(62,207,142,0.1);
    color: var(--green);
    border: 1px solid rgba(62,207,142,0.3);
    border-radius: 6px;
    padding: 0.38rem 0.85rem;
    font-family: var(--mono);
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
  }
  .btn-rescue:hover { background: rgba(62,207,142,0.2); }
  .btn-rescue:disabled { opacity: 0.45; cursor: default; }
  .btn-rescue.rescued { opacity: 0.6; cursor: default; }
  .btn-rescue.in-queue {
    background: rgba(124,106,247,0.12);
    color: var(--accent2);
    border-color: rgba(124,106,247,0.3);
    cursor: pointer;
    opacity: 1;
  }
  .btn-rescue.in-queue:hover {
    background: rgba(124,106,247,0.22);
  }
  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    font-size: 0.72rem;
    font-family: var(--mono);
    padding: 0.2rem 0.55rem;
    border-radius: 4px;
    font-weight: 500;
    letter-spacing: 0.03em;
  }
  .status-pill.in-queue   { color: var(--accent2); background: rgba(124,106,247,0.12); border: 1px solid rgba(124,106,247,0.25); }
  .status-pill.summarised { color: var(--green);   background: rgba(62,207,142,0.10);  border: 1px solid rgba(62,207,142,0.25); }
  .status-pill.awaiting   { color: var(--yellow);  background: rgba(245,166,35,0.10);  border: 1px solid rgba(245,166,35,0.25); }
  .status-pill.unfetched  { color: var(--muted);   background: rgba(102,102,114,0.10); border: 1px solid var(--border); }
  .unsummarised-note {
    font-size: 0.72rem;
    color: var(--dim);
    font-style: italic;
  }
  /* ── Status indicator (history) ── */
  .status-indicator {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    font-size: 0.68rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 0.15rem 0.5rem;
    border-radius: 3px;
    font-family: var(--mono);
  }
  .status-read     { background: var(--green-dim);  color: var(--green); }
  .status-skipped  { background: var(--yellow-dim); color: var(--yellow); }
  .status-declined { background: var(--red-dim);    color: var(--red); }

  /* ── History filter row ── */
  .filter-row {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-btn {
    font-family: var(--mono);
    font-size: 0.72rem;
    padding: 0.3rem 0.75rem;
    border-radius: 3px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .filter-btn:hover { color: var(--text); border-color: var(--muted); }
  .filter-btn.active-read     { background: var(--green-dim);  color: var(--green);   border-color: var(--green); }
  .filter-btn.active-skipped  { background: var(--yellow-dim); color: var(--yellow);  border-color: var(--yellow); }
  .filter-btn.active-declined { background: var(--red-dim);    color: var(--red);     border-color: var(--red); }
  .filter-btn.active-all      { background: rgba(124,106,247,0.15); color: var(--accent2); border-color: var(--accent); }

  .filter-count { font-size: 0.65rem; opacity: 0.8; }

  /* ── Toast ── */
  #toast-container {
    position: fixed;
    bottom: 1.5rem; right: 1.5rem;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    pointer-events: none;
  }

  .toast {
    font-family: var(--mono);
    font-size: 0.75rem;
    letter-spacing: 0.04em;
    padding: 0.6rem 1rem;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 4px;
    color: var(--text);
    animation: toastIn 0.2s ease, toastOut 0.3s ease 2.5s forwards;
    max-width: 300px;
    pointer-events: auto;
  }
  .toast-ok      { border-left: 3px solid var(--green); }
  .toast-skip    { border-left: 3px solid var(--yellow); }
  .toast-decline { border-left: 3px solid var(--red); }
  .toast-error   { border-left: 3px solid var(--red); color: var(--red); }

  @keyframes toastIn  { from { opacity:0; transform: translateX(20px); } to { opacity:1; transform:none; } }
  @keyframes toastOut { to   { opacity:0; transform: translateX(20px); } }

  /* ── Search ── */
  .search-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }

  .search-input {
    font-family: var(--mono);
    font-size: 0.78rem;
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 0.35rem 2rem 0.35rem 0.75rem;
    border-radius: 4px;
    width: 200px;
    outline: none;
    transition: border-color 0.15s, width 0.2s;
    letter-spacing: 0.02em;
  }
  .search-input::placeholder { color: var(--dim); }
  .search-input:focus { border-color: var(--accent); width: 260px; }

  .search-clear {
    position: absolute;
    right: 0.4rem;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.8rem;
    line-height: 1;
    padding: 0.1rem 0.2rem;
    display: none;
    transition: color 0.15s;
  }
  .search-clear:hover { color: var(--text); }
  .search-clear.visible { display: block; }

  .search-match-count {
    font-size: 0.68rem;
    color: var(--dim);
    letter-spacing: 0.04em;
    white-space: nowrap;
  }

  mark {
    background: rgba(124,106,247,0.25);
    color: var(--accent2);
    border-radius: 2px;
    padding: 0 1px;
  }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    header   { padding: 0 1rem; }
    main     { padding: 1rem 1rem 4rem; }
    .tabs    { padding: 0 1rem; }
    .toolbar { padding: 0.75rem 1rem; }
    .tab     { padding: 0.75rem 0.9rem; }
    .card-footer { flex-wrap: wrap; }
    .img-item { width: clamp(160px, 72vw, 240px); }
    .user-chip { display: none !important; } /* hide on very small screens to save space */
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    MudNews
  </div>
  <div class="header-controls">
    <div class="user-chip" id="user-chip">
      <span id="user-chip-name"></span>
    </div>
    <a href="#" class="btn-logout" onclick="event.preventDefault();logout();">⏻ Sign out</a>
  </div>
</header>

<div class="sticky-nav">
<div class="tabs">
  <button class="tab active" onclick="switchTab('queue')" id="tab-queue">
    Queue <span class="tab-badge" id="badge-queue">0</span>
  </button>
  <button class="tab" onclick="switchTab('history')" id="tab-history">
    History <span class="tab-badge" id="badge-history" style="background:var(--muted)">0</span>
  </button>

</div>
<div class="tabs-right">
  <span class="status-text" id="status-text"></span>
  <button class="btn-refresh" id="btn-refresh" onclick="loadQueue()">↻ Refresh</button>
</div>
</div>

<main>
  <div class="panel active" id="panel-queue">
    <div class="history-search-wrap">
      <div class="history-search-row">
        <div class="mode-toggle" id="mode-toggle">
          <button class="mode-btn"        onclick="setMode('top')"    id="btn-mode-top">Top</button>
          <button class="mode-btn active" onclick="setMode('latest')" id="btn-mode-latest">Latest</button>
          <button class="mode-btn"        onclick="setMode('explore')" id="btn-mode-explore">Explore</button>
        </div>
        <input class="history-search-input" id="queue-search-input" type="text"
               placeholder="Filter queue…" autocomplete="off" spellcheck="false"
               oninput="onQueueSearchInput()">
        <button class="history-search-clear" id="queue-search-clear" onclick="clearQueueSearch()" style="display:none">✕</button>
      </div>
      <div class="history-search-meta" id="queue-search-meta"></div>
    </div>
    <div id="queue-list"></div>
  </div>
  <div class="panel" id="panel-history">
    <div class="history-search-wrap">
      <div class="history-search-row">
        <input class="history-search-input" id="history-search-input" type="text"
               placeholder="Filter history…" autocomplete="off" spellcheck="false"
               oninput="onHistorySearchInput()">
        <button class="history-search-clear" id="history-search-clear" onclick="clearHistorySearch()" style="display:none">✕</button>
      </div>
      <div class="history-search-meta" id="history-search-meta"></div>
    </div>
    <div class="filter-row" id="history-filters">
      <button class="filter-btn active-all" onclick="setHistoryFilter('all')"      id="hf-all">All</button>
      <button class="filter-btn"            onclick="setHistoryFilter('read')"     id="hf-read">✓ Archived</button>
      <button class="filter-btn"            onclick="setHistoryFilter('skipped')"  id="hf-skipped">→ Skipped</button>
      <button class="filter-btn"            onclick="setHistoryFilter('declined')" id="hf-declined">✗ Declined</button>
    </div>
    <div id="history-list"></div>
  </div>
  <div class="panel" id="panel-explore">
    <div class="explore-search-wrap">
      <div class="explore-search-row">
        <input class="explore-input" id="explore-input" type="text"
               placeholder="Search all articles…" autocomplete="off" spellcheck="false"
               oninput="onExploreInput()">
        <button class="explore-clear-btn" id="explore-clear" onclick="clearExplore()" style="display:none">✕</button>
      </div>
      <div class="explore-meta" id="explore-meta"></div>
    </div>
    <div id="explore-list"></div>
  </div>
</main>


<!-- Speed Read Modal -->
<div id="sr-modal">
  <div id="sr-inner">
    <button id="sr-close" onclick="srClose()">✕</button>
    <div id="sr-status"></div>
    <div id="sr-word-display"><span id="sr-left"></span><span id="sr-orp"></span><span id="sr-right"></span></div>

      <div id="sr-progress-track"><div id="sr-progress-bar"></div></div>
      <div id="sr-progress-knob"></div>

    <button onclick="srRestart()">↺ Restart</button>

      <span>WPM</span>
      <input id="sr-wpm-slider" type="range" min="100" max="800" step="10" value="250" oninput="srWpmChange(this.value)">
      <span id="sr-wpm-label">250</span>
    </div>
    <div id="sr-font-wrap">
      <span>SIZE</span>
      <input id="sr-font-slider" type="range" min="1" max="6" step="0.5" value="2.5" oninput="srFontChange(this.value)">
      <span id="sr-font-label">2.5</span>

    </div>
  </div>
