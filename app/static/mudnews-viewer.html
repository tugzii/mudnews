  <button id="lightbox-close" onclick="closeLightbox()">✕</button>
  <div id="lightbox-inner">
    <button id="lightbox-prev" onclick="stepLightbox(-1)">&#8249;</button>
    <div id="lightbox-img-wrap">
      <img id="lightbox-img" src="" alt="">
    </div>
    <button id="lightbox-next" onclick="stepLightbox(1)">&#8250;</button>
  </div>
  <div id="lightbox-counter"></div>
  <div id="lightbox-caption"></div>
</div>

<div id="toast-container"></div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const BASE = '/mudnews';
const TOKEN_KEY = 'mudnews_token';
function getToken() { return localStorage.getItem(TOKEN_KEY); }
function logout() { localStorage.removeItem(TOKEN_KEY); window.location.replace('/mudnews/login'); }
function authFetch(url, opts) {
  opts = opts || {};
  opts.headers = Object.assign({}, opts.headers || {}, { 'Authorization': 'Bearer ' + (getToken() || '') });
  return fetch(url, opts).then(function(r) {
    if (r.status === 401) { logout(); return Promise.reject(new Error('Session expired')); }
    return r;
  });
}


// ── State ─────────────────────────────────────────────────────────────────────
let currentMode     = 'latest';
let currentTab      = 'queue';
let exploreResults  = [];
let exploreQuery    = '';
let exploreDebounce = null;
let exploreLoading  = false;
let historyFilter   = 'all';
let queueArticles   = [];
let historyArticles = [];
let loadingQueue    = false;
let searchQuery     = '';
let searchDebounce  = null;
let historySearchQuery    = '';
let historySearchDebounce = null;
let queueSearchQuery      = '';
let queueSearchDebounce   = null;
const contentCache        = {};

function debounce(fn, ms) {
  return (...args) => {
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(() => fn(...args), ms);
  };
}

const debouncedRender = debounce(() => {
  if (currentTab === 'queue') renderQueue();
}, 150);

const imageStore = {};

// ── Username ──────────────────────────────────────────────────────────────────
// Tries /me endpoint (expected to return { username: "..." } or { name: "..." }).
// If your backend instead injects a header or template var, adapt here.
// Gracefully silent on failure — the chip simply stays hidden.
async function loadCurrentUser() {
  try {
    const r = await authFetch(`${BASE}/me`);
    if (!r.ok) return;
    const data = await r.json();
    const name = data.username || data.name || data.email || data.user || '';
    if (name) {
      const chip = document.getElementById('user-chip');
      document.getElementById('user-chip-name').textContent = name;
      chip.classList.add('visible');
    }
  } catch {
    // No /me endpoint yet — that's fine, chip stays hidden
  }
}

// ── Search ────────────────────────────────────────────────────────────────────
function onSearchInput() {
  const input = document.getElementById('search-input');
  searchQuery = input.value.trim().toLowerCase();
  document.getElementById('search-clear').classList.toggle('visible', searchQuery.length > 0);
  debouncedRender();
}

function clearSearch() {
  searchQuery = '';
  const _inp = document.getElementById('search-input');
  if (_inp) _inp.value = '';
  const _clr = document.getElementById('search-clear');
  if (_clr) _clr.classList.remove('visible');
  const _cnt = document.getElementById('search-match-count');
  if (_cnt) _cnt.textContent = '';
}

function onQueueSearchInput() {
  const input = document.getElementById('queue-search-input');
  const val = input.value.trim();
  const clearBtn = document.getElementById('queue-search-clear');
  if (clearBtn) clearBtn.style.display = val ? '' : 'none';
  clearTimeout(queueSearchDebounce);
  if (currentMode === 'explore') {
    queueSearchDebounce = setTimeout(() => loadExploreInQueue(val), 400);
  } else {
    queueSearchQuery = val.toLowerCase();
    queueSearchDebounce = setTimeout(renderQueue, 150);
  }
}

function clearQueueSearch() {
  queueSearchQuery = '';
  const input = document.getElementById('queue-search-input');
  if (input) input.value = '';
  const clearBtn = document.getElementById('queue-search-clear');
  if (clearBtn) clearBtn.style.display = 'none';
  const metaEl = document.getElementById('queue-search-meta');
  if (metaEl) metaEl.textContent = '';
  if (currentMode === 'explore') {
    loadExploreInQueue('');
  } else {
    renderQueue();
  }
}

function onHistorySearchInput() {
  const input = document.getElementById('history-search-input');
  historySearchQuery = input.value.trim().toLowerCase();
  const clearBtn = document.getElementById('history-search-clear');
  if (clearBtn) clearBtn.style.display = historySearchQuery ? '' : 'none';
  clearTimeout(historySearchDebounce);
  historySearchDebounce = setTimeout(renderHistory, 150);
}

function clearHistorySearch() {
  historySearchQuery = '';
  const input = document.getElementById('history-search-input');
  if (input) input.value = '';
  const clearBtn = document.getElementById('history-search-clear');
  if (clearBtn) clearBtn.style.display = 'none';
  const metaEl = document.getElementById('history-search-meta');
  if (metaEl) metaEl.textContent = '';
  renderHistory();
}

function articleMatchesQuery(a, q) {
  if (!q) return true;
  const norm = s => (s || '').toLowerCase().replace(/\s+/g, ' ');
  const nq = norm(q);
  const id = a.article_id || a.id;
  return norm(a.title).includes(nq)
      || norm(a.description).includes(nq)
      || norm(a.category).includes(nq)
      || !!(contentCache[id] && norm(contentCache[id]).includes(nq));
}

function highlightQuery(text, q) {
  if (!q || !text) return escHtml(text || '');
  const escaped = escHtml(text);
  const escapedQ = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return escaped.replace(new RegExp(`(${escapedQ})`, 'gi'), '<mark>$1</mark>');
}

// ── Speed Read ────────────────────────────────────────────────────────────────
let srWords   = [];
let srIndex   = 0;
let srWpm     = 0; // set from slider on open
let srTimer   = null;
let srPlaying = false;
// Generation counter: incremented on every srStop so stale countdown ticks
// know to bail out without touching state.
let srGen     = 0;

function srRenderWord(w) {
  const n = w.length;
  // Middle character: floor(n/2) gives index 0 for 1-char, 1 for 2-3 chars,
  // 2 for 4-5 chars, etc. — always biased left on even-length words.
  const pos = Math.floor((n - 1) / 2);
  document.getElementById("sr-left").textContent  = w.slice(0, pos);
  document.getElementById("sr-orp").textContent   = w[pos] || "";
  document.getElementById("sr-right").textContent = w.slice(pos + 1);
}

function srOpen(text) {
  srStop();
  const plain = text.replace(/<[^>]*>/g, " ").replace(/&[a-z#0-9;]+;/gi, " ").replace(/\s+/g, " ").trim();
  srWords = plain.split(" ").filter(w => w.length > 0);
  srIndex = 0;
  document.getElementById("sr-modal").classList.add("open");
  document.body.style.overflow = "hidden";
  // Sync font size from slider so changing the HTML value attribute is enough
  const wpmSlider = document.getElementById("sr-wpm-slider");
  srWpm = parseInt(wpmSlider.value);
  document.getElementById("sr-wpm-label").textContent = wpmSlider.value;
  const slider = document.getElementById("sr-font-slider");
  srFontChange(slider.value);
  document.getElementById("sr-font-label").textContent = slider.value;
  srRender();
  document.getElementById("sr-play-btn").textContent = "▶ Play";
}

function srClose() {
  srStop();
  document.getElementById("sr-modal").classList.remove("open");
  document.body.style.overflow = "";
}

function srRender() {
  const w = srWords[srIndex] || "";
  srRenderWord(w);
  const pct = srWords.length > 1 ? (srIndex / (srWords.length - 1)) * 100 : 0;
  document.getElementById("sr-progress-bar").style.width = pct + "%";
  document.getElementById("sr-progress-knob").style.left  = pct + "%";
  document.getElementById("sr-status").textContent =
    (srIndex + 1) + " / " + srWords.length + " words";
}

function srDelay(word) {
  const base  = 60000 / srWpm;
  const extra = word.length > 8 ? base * 0.3 : 0;
  const punct = /[.!?,;:]$/.test(word) ? base * 0.5 : 0;
  return base + extra + punct;
}

function srStep(gen) {
  // Bail if this tick belongs to a cancelled generation
  if (gen !== srGen) return;
  if (srIndex >= srWords.length - 1) { srStop(); return; }
  srIndex++;
  srRender();
  srTimer = setTimeout(() => srStep(gen), srDelay(srWords[srIndex]));
}

function srStop() {
  srGen++;                // invalidates any in-flight countdown or step timeouts
  clearTimeout(srTimer);
  srTimer   = null;
  srPlaying = false;
  const btn = document.getElementById("sr-play-btn");
  if (btn) btn.textContent = "▶ Play";
}

function srStart() {
  if (srPlaying) return;  // guard against double-calls
  if (srIndex >= srWords.length - 1) srIndex = 0;
  srPlaying = true;
  document.getElementById("sr-play-btn").textContent = "⏸ Pause";

  // Capture the generation at the moment we start so countdown ticks
  // can detect if srStop() was called while they were waiting.
  const myGen = ++srGen;
  let count = 3;

  const tick = () => {
    if (myGen !== srGen) return;  // paused/stopped since this countdown began
    if (count > 0) {
      // Show countdown number where the word normally appears
      document.getElementById("sr-left").textContent  = "";
      document.getElementById("sr-orp").textContent   = count;
      document.getElementById("sr-right").textContent = "";
      document.getElementById("sr-orp").style.color   = "#ff4444";
      count--;
      srTimer = setTimeout(tick, 700);
    } else {
      // Restore ORP colour and start playback
      document.getElementById("sr-orp").style.color = "#ff4444";
      srRender();
      srTimer = setTimeout(() => srStep(myGen), srDelay(srWords[srIndex]));
    }
  };
  tick();
}

function srTogglePlay() {
  if (srPlaying) { srStop(); } else { srStart(); }
}

function srRestart() {
  srStop();
  srIndex = 0;
  srRender();
}

function srScrubTo(pct) {
  // Jump to a position 0-100% in the word list
  pct = Math.max(0, Math.min(100, pct));
  srIndex = Math.round((pct / 100) * (srWords.length - 1));
  srRender();
}

function srWrapPos(e, wrap) {
  const rect = wrap.getBoundingClientRect();
  const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
  return (x / rect.width) * 100;
}

function srInitScrubber() {
  const wrap = document.getElementById("sr-progress-wrap");
  let dragging = false;

  wrap.addEventListener("mousedown", e => {
    dragging = true;
    const wasPlaying = srPlaying;
    if (wasPlaying) srStop();
    srScrubTo(srWrapPos(e, wrap));
    wrap._wasPlaying = wasPlaying;
    e.preventDefault();
  });
  window.addEventListener("mousemove", e => {
    if (!dragging) return;
    srScrubTo(srWrapPos(e, wrap));
  });
  window.addEventListener("mouseup", () => {
    if (!dragging) return;
    dragging = false;
    if (wrap._wasPlaying) srStart();
  });

  // Touch support
  wrap.addEventListener("touchstart", e => {
    dragging = true;
    const wasPlaying = srPlaying;
    if (wasPlaying) srStop();
    srScrubTo(srWrapPos(e, wrap));
    wrap._wasPlaying = wasPlaying;
  }, { passive: true });
  window.addEventListener("touchmove", e => {
    if (!dragging) return;
    srScrubTo(srWrapPos(e, wrap));
  }, { passive: true });
  window.addEventListener("touchend", () => {
    if (!dragging) return;
    dragging = false;
    if (wrap._wasPlaying) srStart();
  });
}

function srWpmChange(val) {
  srWpm = parseInt(val);
  document.getElementById("sr-wpm-label").textContent = val;
}

function srFontChange(val) {
  document.getElementById("sr-word-display").style.fontSize = val + "rem";
  document.getElementById("sr-font-label").textContent = val;
}

// ── Lightbox state ────────────────────────────────────────────────────────────
let lightboxImages = [];
let lightboxIndex  = 0;

// ── Init ──────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  if (!getToken()) { window.location.replace('/mudnews/login'); return; }

  loadCurrentUser();
  loadQueue();
  loadHistory();
  srInitScrubber();
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      if (document.getElementById('sr-modal').classList.contains('open')) { srClose(); return; }
      if (currentTab === 'queue' && queueSearchQuery) { clearQueueSearch(); return; }
      if (currentTab === 'history' && historySearchQuery) { clearHistorySearch(); return; }
      closeLightbox();
    }
    if (e.key === ' ' && document.getElementById('sr-modal').classList.contains('open')) { e.preventDefault(); srTogglePlay(); return; }
    if (e.key === 'ArrowLeft')  stepLightbox(-1);
    if (e.key === 'ArrowRight') stepLightbox(1);
    if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      const _sid = currentTab === 'history' ? 'history-search-input'
                 : currentTab === 'explore' ? 'explore-input'
                 : 'queue-search-input';
      const _sel = document.getElementById(_sid);
      if (_sel) _sel.focus();
    }
  });
});

// ── Tabs ──────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  document.getElementById(`panel-${tab}`).classList.add('active');
  const isHistory = tab === 'history';
  const isExplore = tab === 'explore';
  if (isHistory) {
    document.getElementById('btn-refresh').onclick = loadHistory;
    loadHistory();
  } else if (isExplore) {
    document.getElementById('btn-refresh').onclick = () => exploreQuery ? runExplore() : loadRecentArticles();
  } else {
    document.getElementById('btn-refresh').onclick = () => {
      if (currentMode === 'explore') loadExploreInQueue(document.getElementById('queue-search-input').value.trim());
      else loadQueue();
    };
  }
  if (isExplore) {
    setTimeout(() => document.getElementById('explore-input').focus(), 50);
    if (!exploreQuery && !exploreResults.length) loadRecentArticles();
  }
}

// ── Mode ──────────────────────────────────────────────────────────────────────
function setMode(mode) {
  if (mode === currentMode) return;
  currentMode = mode;
  document.getElementById('btn-mode-top').classList.toggle('active', mode === 'top');
  document.getElementById('btn-mode-latest').classList.toggle('active', mode === 'latest');
  document.getElementById('btn-mode-explore').classList.toggle('active', mode === 'explore');
  queueArticles = [];
  const searchInput = document.getElementById('queue-search-input');
  if (mode === 'explore') {
    searchInput.placeholder = 'Search all articles…';
    clearQueueSearch();
    loadExploreInQueue('');
  } else {
    searchInput.placeholder = 'Filter queue…';
    clearQueueSearch();
    loadQueue();
  }
}

// ── Queue ─────────────────────────────────────────────────────────────────────
async function loadQueue() {
  if (loadingQueue) return;
  loadingQueue = true;
  const refreshBtn = document.getElementById('btn-refresh');
  refreshBtn.disabled = true;
  setStatus('<span class="spinner"></span>Loading…');
  queueArticles = [];
  renderQueue();
  try {
    const r = await authFetch(`${BASE}/get-queue?mode=${currentMode}`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    queueArticles = Array.isArray(data) ? data : (data.articles || []);
    queueArticles.forEach(a => {
      const id = a.article_id || a.id;
      if (a.images) imageStore[id] = parseImages(a.images);
    });
  } catch(e) {
    console.error('Queue fetch error:', e);
    showToast('Connection error loading queue', 'error');
  }
  renderQueue();
  updateBadge('queue', queueArticles.length);
  setStatus(queueArticles.length
    ? `${queueArticles.length} article${queueArticles.length !== 1 ? 's' : ''} ready`
    : 'No articles');
  refreshBtn.disabled = false;
  loadingQueue = false;
}

// ── History ───────────────────────────────────────────────────────────────────
async function loadHistory() {
  setStatus('<span class="spinner"></span>Loading history…');
  try {
    const r = await authFetch(`${BASE}/get-history`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    historyArticles = Array.isArray(data) ? data : (data.articles || []);
    historyArticles.forEach(a => {
      const id = a.article_id || a.id;
      if (a.images) imageStore[id] = parseImages(a.images);
    });
    updateBadge('history', historyArticles.length);
    if (document.getElementById('tab-history').classList.contains('active')) renderHistory();
    setStatus('');
  } catch(e) {
    console.error('History fetch error:', e);
    showToast('Could not load history', 'error');
    setStatus('History unavailable');
  }
}

// ── Parse images ──────────────────────────────────────────────────────────────
function parseImages(raw) {
  if (!raw) return [];
  if (Array.isArray(raw)) return raw;
  if (typeof raw === 'string') { try { return JSON.parse(raw); } catch { return []; } }
  return [];
}

// ── Render ────────────────────────────────────────────────────────────────────
let exploreInQueueLoading = false;
async function loadExploreInQueue(q = '') {
  if (exploreInQueueLoading) return;
  exploreInQueueLoading = true;
  const list = document.getElementById('queue-list');
  const metaEl = document.getElementById('queue-search-meta');
  if (metaEl) metaEl.textContent = q ? 'Searching…' : 'Loading recent articles…';
  list.innerHTML = '';
  try {
    const url = q.length >= 2
      ? `${BASE}/explore-articles?q=${encodeURIComponent(q)}&limit=100`
      : `${BASE}/explore-articles?limit=100`;
    const r = await authFetch(url);
    if (!r.ok) throw new Error(r.status);
    const data = await r.json();
    const articles = data.articles || [];
    if (metaEl) metaEl.textContent = articles.length
      ? (q ? `${articles.length} result${articles.length !== 1 ? 's' : ''} for “${q}”`
           : `${articles.length} most recent articles`)
      : (q ? `No results for “${q}”` : 'No articles found');
    if (!articles.length) {
      list.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>${
        q ? `No results for "<strong>${escHtml(q)}</strong>"` : 'No articles found'
      }</p></div>`;
      return;
    }
    list.innerHTML = articles.map((a, i) => buildCard(a, i, false, q || '')).join('');
  } catch(e) {
    console.error('Explore error:', e);
    if (metaEl) metaEl.textContent = 'Failed to load';
  } finally {
    exploreInQueueLoading = false;
  }
}

function renderQueue() {
  const list = document.getElementById('queue-list');
  const filtered = queueSearchQuery
    ? queueArticles.filter(a => articleMatchesQuery(a, queueSearchQuery))
    : queueArticles;

  const metaEl = document.getElementById('queue-search-meta');
  if (metaEl) metaEl.textContent = queueSearchQuery ? `${filtered.length} / ${queueArticles.length} match${filtered.length !== 1 ? 'es' : ''}` : '';

  if (!filtered.length) {
    const msg = queueSearchQuery
      ? `No results for "<strong>${escHtml(queueSearchQuery)}</strong>"`
      : loadingQueue ? '' : 'No articles in queue for this mode.';
    list.innerHTML = `<div class="empty-state"><div class="icon">${queueSearchQuery ? '🔍' : '📭'}</div><p>${msg}</p></div>`;
    return;
  }
  list.innerHTML = filtered.map((a, i) => buildCard(a, i, false, queueSearchQuery)).join('');
}

function renderHistory() {
  const list = document.getElementById('history-list');
  let filtered = historyArticles;
  if (historyFilter !== 'all') filtered = historyArticles.filter(a => a.status === historyFilter);
  if (historySearchQuery) filtered = filtered.filter(a => articleMatchesQuery(a, historySearchQuery));

  const counts = { all: historyArticles.length, read: 0, skipped: 0, declined: 0 };
  historyArticles.forEach(a => { if (counts[a.status] !== undefined) counts[a.status]++; });
  ['all','read','skipped','declined'].forEach(f => {
    const el = document.getElementById(`hf-${f}`);
    el.innerHTML = { all: 'All', read: '✓ Archived', skipped: '→ Skipped', declined: '✗ Declined' }[f]
      + ` <span class="filter-count">(${counts[f]})</span>`;
  });

  const baseCount = historyFilter === 'all' ? historyArticles.length : historyArticles.filter(a => a.status === historyFilter).length;
  const metaEl = document.getElementById('history-search-meta');
  if (metaEl) metaEl.textContent = historySearchQuery ? `${filtered.length} / ${baseCount} match${filtered.length !== 1 ? 'es' : ''}` : '';

  if (!filtered.length) {
    const msg = historySearchQuery
      ? `No results for "<strong>${escHtml(historySearchQuery)}</strong>"`
      : `No ${historyFilter === 'all' ? '' : historyFilter + ' '}articles yet.`;
    list.innerHTML = `<div class="empty-state"><div class="icon">${historySearchQuery ? '🔍' : '🗂️'}</div><p>${msg}</p></div>`;
    return;
  }
  list.innerHTML = filtered.map((a, i) => buildCard(a, i, true, historySearchQuery)).join('');
}

// ── Build card ────────────────────────────────────────────────────────────────
function buildCard(a, index, isHistory, query = '') {
  const artId    = a.article_id || a.id;
  const score    = a.ai_score || a.effective_score || 0;
  const decay    = a.decay || 'moderate';
  const title    = query ? highlightQuery(a.title || 'Untitled', query) : escHtml(a.title || 'Untitled');
  const summary  = query ? highlightQuery(a.summary || '', query) : escHtml(a.summary || '');
  const artUrl   = a.url || '#';
  const category = query ? highlightQuery(a.category || '', query) : escHtml(a.category || '');
  const age      = timeAgo(a.published_at || a.created_at || a.actioned_at);
  const desc     = a.description || '';
  const cardId   = `${isHistory ? 'h' : 'q'}-card-${artId}`;

  const scoreClass = score >= 75 ? 'score-high' : score >= 50 ? 'score-mid' : 'score-low';
  const decayLabel = decay.charAt(0).toUpperCase() + decay.slice(1);

  const images    = imageStore[artId] || [];
  const hasImages = images.length > 0;
  const imgHint   = hasImages
    ? `<span style="color:var(--dim);font-size:0.65rem;letter-spacing:0.04em;margin-left:0.25rem">· ${images.length} photo${images.length !== 1 ? 's' : ''}</span>`
    : '';

  const statusIcon = { read: '✓', skipped: '→', declined: '✗' }[a.status] || '';
  const statusBadge = isHistory && a.status ? `
    <span class="status-indicator status-${a.status}">
      ${statusIcon} ${a.status}
    </span>` : '';

  const actionBtns = !isHistory ? `
    <button class="btn-action btn-read"    onclick="markArticle(${artId},'read',    '${cardId}')">✓ Archive</button>
    <!-- Skip hidden — was used for Alexa voice mode; kept for potential future use -->
    <button class="btn-action btn-skip"    onclick="markArticle(${artId},'skipped', '${cardId}')" style="display:none">→ Skip</button>
    <button class="btn-action btn-decline" onclick="markArticle(${artId},'declined','${cardId}')">✗ Decline</button>
  ` : statusBadge;

  const expandText = hasImages ? `expand ↓ ${imgHint}` : 'expand ↓';

  return `
  <div class="article-card ${isHistory ? 'history-card' : ''}" id="${cardId}" style="animation-delay:${index * 0.04}s" data-article-id="${artId}">
    <div class="card-header" onclick="toggleExpand('${cardId}',${artId})">
      <div style="flex:1;min-width:0;">
        <div class="card-meta">
          <span class="score-badge ${scoreClass}">Score ${Math.round(score)}</span>
          <span class="decay-badge decay-${decay}">${decayLabel}</span>
          ${category ? `<span class="category-tag">${category}</span>` : ''}
          <span class="age-tag">${age}</span>
        </div>
        <div class="card-title">${title}</div>
        ${desc ? `<div class="card-desc">${escHtml(desc)}</div>` : ""}
      </div>
    </div>
    <div class="card-body">
      ${summary ? `<div class="card-summary" id="sum-${cardId}" onclick="event.stopPropagation();toggleExpand('${cardId}',${artId})">${summary}</div>` : ''}
      <div class="card-full-content" id="full-${cardId}"></div>
      <div class="card-images"       id="imgs-${cardId}"></div>
      <span class="expand-hint" id="hint-${cardId}" onclick="toggleExpand('${cardId}',${artId})">${expandText}</span>
    </div>
    <div class="card-footer">
      ${actionBtns}
      <button class="btn-full-article" id="full-btn-${artId}" onclick="openFullArticle(${artId}, this)">⊞ Full Article</button>
      ${summary ? `<button class="btn-speed-read" onclick="srOpen(document.getElementById('sum-${cardId}').innerHTML)">⚡ Speed Read</button>` : ''}
      <span class="footer-id-chip">#${artId}</span>
      <a href="${escHtml(artUrl)}" target="_blank" rel="noopener" class="btn-url">↗ Source</a>
    </div>
  </div>`;
}

// ── Full Article ──────────────────────────────────────────────────────────────
async function openFullArticle(articleId, btn) {
  if (btn) {
    btn.disabled = true;
    btn.textContent = '⏳ Loading…';
  }
  try {
    // Pre-fetch to confirm the article exists and wake the endpoint,
    // then open the page in a new tab.  The tab's own JS will fetch again
    // to render — this first call is just a cheap "does it exist?" check
    // so we can show a sensible error without losing focus.
    const r = await authFetch(`${BASE}/article-data/${articleId}`);
    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      showToast(err.detail || `Article not available (${r.status})`, 'error');
      return;
    }
    window.open(`${BASE}/article/${articleId}`, '_blank', 'noopener');
  } catch (e) {
    console.error('openFullArticle error:', e);
    showToast('Could not open article — connection error', 'error');
  } finally {
    if (btn) {
      btn.disabled = false;
      btn.textContent = '⊞ Full Article';
    }
  }
}

// ── Expand / collapse ─────────────────────────────────────────────────────────
function toggleExpand(cardId, artId) {
  const sumEl  = document.getElementById(`sum-${cardId}`);
  const hint   = document.getElementById(`hint-${cardId}`);
  const imgsEl = document.getElementById(`imgs-${cardId}`);
  const fullEl = document.getElementById(`full-${cardId}`);
  if (!hint && !fullEl) return;

  // Determine current state from fullEl visibility (works with or without summary)
  const expanded = fullEl ? fullEl.style.display !== 'block' : !(sumEl && sumEl.classList.contains('expanded'));

  if (sumEl) sumEl.classList.toggle('expanded', expanded);
  const images    = imageStore[artId] || [];
  const hasImages = images.length > 0;

  if (expanded) {
    // Fetch and render full article content inline
    if (fullEl && !fullEl.dataset.loaded) {
      fullEl.dataset.loaded = '1';
      fullEl.style.display  = 'block';
      fullEl.innerHTML = '<p style="color:var(--dim);font-size:0.82rem;padding:0.25rem 0">Loading…</p>';
      authFetch(`${BASE}/article-data/${artId}`)
        .then(r => r.ok ? r.json() : Promise.reject(r.status))
        .then(data => {
          const raw = data.full_content || '';
          contentCache[artId] = raw.toLowerCase();
          const paras = raw.split(/\n+/).filter(p => p.trim());
          fullEl.innerHTML = paras.length
            ? paras.map(p => `<p>${escHtml(p)}</p>`).join('')
            : `<p style="color:var(--muted);font-style:italic">Full content not available.</p>`;
        })
        .catch(() => { fullEl.innerHTML = `<p style="color:var(--muted);font-style:italic">Could not load article.</p>`; });
    } else if (fullEl) {
      fullEl.style.display = 'block';
    }
    if (hasImages && imgsEl && !imgsEl.dataset.loaded) {
      imgsEl.dataset.loaded = '1';
      imgsEl.innerHTML = buildImageStrip(images, artId);
      imgsEl.querySelectorAll('img[data-src]').forEach(img => {
        const skeletonId = img.dataset.skeletonId;
        img.onload = () => {
          img.classList.add('loaded');
          const skel = document.getElementById(skeletonId);
          if (skel) skel.classList.add('hidden');
        };
        img.onerror = () => {
          img.classList.add('errored');
          const skel = document.getElementById(skeletonId);
          if (skel) skel.classList.add('hidden');
          const item = img.closest('.img-item');
          if (item) item.style.display = 'none';
        };
        img.src = img.dataset.src;
      });
      wireStripArrows(artId);
    }
    if (imgsEl && hasImages) {
      imgsEl.classList.add('animating');
      requestAnimationFrame(() => requestAnimationFrame(() => imgsEl.classList.add('visible')));
    }
    if (hint) hint.innerHTML = 'collapse ↑';
  } else {
    if (fullEl) fullEl.style.display = 'none';
    if (imgsEl) {
      imgsEl.classList.remove('visible');
      setTimeout(() => imgsEl.classList.remove('animating'), 300);
    }
    const imgHint = hasImages
      ? `<span style="color:var(--dim);font-size:0.65rem;letter-spacing:0.04em;margin-left:0.25rem">· ${images.length} photo${images.length !== 1 ? 's' : ''}</span>`
      : '';
    if (hint) hint.innerHTML = hasImages ? `expand ↓ ${imgHint}` : 'expand ↓';
  }
}

// ── Wire strip arrows ─────────────────────────────────────────────────────────
function wireStripArrows(artId) {
  const scroll  = document.getElementById(`scroll-${artId}`);
  const prevBtn = document.getElementById(`sprev-${artId}`);
  const nextBtn = document.getElementById(`snext-${artId}`);
  if (!scroll || !prevBtn || !nextBtn) return;

  function updateArrows() {
    const atStart = scroll.scrollLeft <= 4;
    const atEnd   = scroll.scrollLeft >= scroll.scrollWidth - scroll.clientWidth - 4;
    prevBtn.disabled = atStart;
    nextBtn.disabled = atEnd;
  }

  function scrollByOne(dir) {
    const firstItem = scroll.querySelector('.img-item');
    const step = firstItem ? firstItem.offsetWidth + 10 : 270;
    scroll.scrollBy({ left: dir * step, behavior: 'smooth' });
  }

  prevBtn.addEventListener('click', e => { e.stopPropagation(); scrollByOne(-1); });
  nextBtn.addEventListener('click', e => { e.stopPropagation(); scrollByOne(1); });
  scroll.addEventListener('scroll', updateArrows, { passive: true });
  updateArrows();
}

// ── Build image strip ─────────────────────────────────────────────────────────
function buildImageStrip(images, artId) {
  const storeId = `imgdata-${artId}`;
  const items = images.map((img, i) => {
    const skId = `skel-${artId}-${i}`;
    const url  = escHtml(img.url || '');
    const alt  = escHtml(img.alt || '');
    const cap  = escHtml(img.caption || img.alt || '');
    return `
      <div class="img-item" onclick="openLightboxByIndex('${storeId}',${i})">
        <div class="img-skeleton" id="${skId}"></div>
        <img data-src="${url}" data-skeleton-id="${skId}" alt="${alt}">
        ${cap ? `<div class="img-caption">${cap}</div>` : ''}
      </div>`;
  }).join('');

  return `
    <script type="application/json" id="${storeId}">${JSON.stringify(images)}<\/script>
    <div class="images-count-hint">${images.length} photograph${images.length !== 1 ? 's' : ''} · tap to enlarge</div>
    <div class="images-strip-wrap">
      <button class="strip-arrow strip-arrow-prev" id="sprev-${artId}" disabled>&#8249;</button>
      <div class="images-scroll" id="scroll-${artId}">${items}</div>
      <button class="strip-arrow strip-arrow-next" id="snext-${artId}">&#8250;</button>
    </div>`;
}

// ── Lightbox ──────────────────────────────────────────────────────────────────
function openLightboxByIndex(storeId, index) {
  const el = document.getElementById(storeId);
  if (!el) return;
  lightboxImages = JSON.parse(el.textContent);
  lightboxIndex  = index;

  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
  renderLightbox();

  // Preload all images to find the widest display width.
  // The image wrap is locked to that width so the photo centre — and
  // therefore both arrows — never shift position between photos.
  const ARROW_W   = 40;  // px, matches CSS width of buttons
  const ARROW_PAD = 12;  // gap between arrow edge and image area
  const maxViewW  = window.innerWidth  * 0.92 - (ARROW_W + ARROW_PAD) * 2;
  const maxViewH  = window.innerHeight * 0.85;

  let loaded = 0;
  let maxW   = 0;

  lightboxImages.forEach(imgData => {
    const probe = new Image();
    probe.onload = probe.onerror = () => {
      if (probe.naturalWidth && probe.naturalHeight) {
        const scale = Math.min(
          maxViewW / probe.naturalWidth,
          maxViewH / probe.naturalHeight,
          1  // never upscale
        );
        maxW = Math.max(maxW, Math.round(probe.naturalWidth * scale));
      }
      if (++loaded === lightboxImages.length && maxW > 0) {
        // Lock the image slot to the widest photo's display width.
        // Arrows are absolutely positioned, so inner needs padding to
        // keep them from overlapping the image.
        const wrap  = document.getElementById('lightbox-img-wrap');
        const inner = document.getElementById('lightbox-inner');
        wrap.style.width   = maxW + 'px';
        inner.style.paddingLeft  = (ARROW_W + ARROW_PAD) + 'px';
        inner.style.paddingRight = (ARROW_W + ARROW_PAD) + 'px';
      }
    };
    probe.src = imgData.url || '';
  });
}

function renderLightbox() {
  const img     = lightboxImages[lightboxIndex];
  const total   = lightboxImages.length;
  const prevBtn = document.getElementById('lightbox-prev');
  const nextBtn = document.getElementById('lightbox-next');

  document.getElementById('lightbox-img').src             = img.url || '';
  document.getElementById('lightbox-caption').textContent = img.caption || img.alt || '';
  document.getElementById('lightbox-counter').textContent = total > 1 ? `${lightboxIndex + 1} / ${total}` : '';

  prevBtn.disabled = lightboxIndex === 0;
  nextBtn.disabled = lightboxIndex === total - 1;
}

function stepLightbox(dir) {
  const next = lightboxIndex + dir;
  if (next < 0 || next >= lightboxImages.length) return;
  lightboxIndex = next;
  renderLightbox();
}

function closeLightbox(e) {
  if (e && e.target !== document.getElementById('lightbox') && e.target !== document.getElementById('lightbox-close') && e.target !== document.getElementById('lightbox-inner')) return;
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-img').src = '';
  document.getElementById('lightbox-img-wrap').style.width = '';
  document.getElementById('lightbox-inner').style.paddingLeft  = '';
  document.getElementById('lightbox-inner').style.paddingRight = '';
  document.getElementById('lightbox-inner').style.minWidth = '';
  lightboxImages = [];
  document.body.style.overflow = '';
}

// ── Mark article ──────────────────────────────────────────────────────────────
async function markArticle(articleId, status, cardId) {
  const card = document.getElementById(cardId);
  if (card) card.querySelectorAll('.btn-action').forEach(b => b.disabled = true);
  try {
    const r = await authFetch(`${BASE}/mark-read`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ article_id: articleId, status })
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const toastType = { read: 'ok', skipped: 'skip', declined: 'decline' }[status] || 'ok';
    const toastMsg  = { read: '✓ Archived', skipped: '→ Skipped', declined: '✗ Declined' }[status];
    showToast(toastMsg, toastType);
    if (card) {
      card.classList.add('fading');
      setTimeout(() => {
        card.remove();
        queueArticles = queueArticles.filter(a => (a.article_id || a.id) !== articleId);
        updateBadge('queue', queueArticles.length);
        if (!document.querySelectorAll('#queue-list .article-card').length) renderQueue();
      }, 350);
    }
    loadHistory();
  } catch(e) {
    console.error('markArticle error:', e);
    showToast('Failed to mark article', 'error');
    if (card) card.querySelectorAll('.btn-action').forEach(b => b.disabled = false);
  }
}

// ── History filter ────────────────────────────────────────────────────────────
function setHistoryFilter(f) {
  historyFilter = f;
  ['all','read','skipped','declined'].forEach(x => {
    const el = document.getElementById(`hf-${x}`);
    el.className = 'filter-btn' + (x === f ? ` active-${x}` : '');
  });
  renderHistory();
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function timeAgo(iso) {
  if (!iso) return '';
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1)  return 'just now';
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ago`;
  const d = Math.floor(h / 24);
  return `${d}d ago`;
}

function setStatus(html)         { document.getElementById('status-text').innerHTML = html; }
function updateBadge(tab, count) { document.getElementById(`badge-${tab}`).textContent = count; }
function setMatchCount(matched, total) {
  const el = document.getElementById('search-match-count');
  el.textContent = searchQuery ? `${matched} / ${total}` : '';
}

function showToast(msg, type = 'ok') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className   = `toast toast-${type}`;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}
// ── Explore ───────────────────────────────────────────────────────────────────
function onExploreInput() {
  const val = document.getElementById('explore-input').value.trim();
  document.getElementById('explore-clear').style.display = val ? 'inline-block' : 'none';
  clearTimeout(exploreDebounce);
  if (val.length >= 2) {
    exploreDebounce = setTimeout(runExplore, 400);
  } else if (!val) {
    exploreDebounce = setTimeout(loadRecentArticles, 200);
  }
}

function clearExplore() {
  document.getElementById('explore-input').value = '';
  document.getElementById('explore-clear').style.display = 'none';
  exploreResults = [];
  exploreQuery = '';
  loadRecentArticles();
}

async function loadRecentArticles() {
  if (exploreLoading) return;
  exploreLoading = true;
  exploreQuery = '';
  document.getElementById('explore-meta').textContent = 'Loading recent articles…';
  document.getElementById('explore-list').innerHTML = '';
  try {
    const r = await authFetch(`${BASE}/recent-articles?limit=50`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    exploreResults = data.articles || [];
    const count = exploreResults.length;
    document.getElementById('explore-meta').textContent =
      count ? `${count} most recent article${count !== 1 ? 's' : ''}` : 'No articles found';
    renderExplore();
  } catch(e) {
    console.error('loadRecentArticles error:', e);
    document.getElementById('explore-meta').textContent = 'Failed to load articles';
  } finally {
    exploreLoading = false;
  }
}

async function runExplore() {
  const q = document.getElementById('explore-input').value.trim();
  if (!q || q.length < 2) { loadRecentArticles(); return; }
  if (exploreLoading) return;
  exploreLoading = true;
  exploreQuery = q;
  document.getElementById('explore-meta').textContent = 'Searching…';
  document.getElementById('explore-list').innerHTML = '';

  try {
    const r = await authFetch(`${BASE}/search-articles?q=${encodeURIComponent(q)}&limit=50`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    exploreResults = data.articles || [];
    const count = exploreResults.length;
    document.getElementById('explore-meta').textContent =
      count ? `${count} result${count !== 1 ? 's' : ''} for "${q}"` : `No results for "${q}"`;
    renderExplore();
  } catch(e) {
    console.error('Explore fetch error:', e);
    showToast('Search failed', 'error');
    document.getElementById('explore-meta').textContent = 'Search failed';
  } finally {
    exploreLoading = false;
  }
}

function renderExplore() {
  const list = document.getElementById('explore-list');
  if (!exploreResults.length) {
    list.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>No results for "<strong>${escHtml(exploreQuery)}</strong>"</p></div>`;
    return;
  }
  list.innerHTML = exploreResults.map((a, i) => buildExploreCard(a, i)).join('');
}

function buildExploreCard(a, index) {
  const artId        = a.article_id || a.id;
  const score        = a.ai_score != null ? a.ai_score : null;
  const scoreClass   = score == null ? 'score-low' : score >= 75 ? 'score-high' : score >= 50 ? 'score-mid' : 'score-low';
  const scoreLabel   = score != null ? `Score ${Math.round(score)}` : 'Unscored';
  const decay        = a.decay || 'moderate';
  const decayLabel   = decay.charAt(0).toUpperCase() + decay.slice(1);
  const age          = timeAgo(a.published_at || a.created_at);
  const isRescued    = !!a.rescued_at;
  const isSummarised = !!a.is_summarised;
  const hasContent   = !!a.content_fetched;
  const interaction  = a.interaction_status;
  const cardId       = `ex-card-${artId}`;
  const summary      = '';
  const title  = highlightQuery(a.title || 'Untitled', exploreQuery);
  const desc   = highlightQuery(a.description || '', exploreQuery);
  const reason = a.ai_reason ? escHtml(a.ai_reason) : '';

  // ── Status pill ────────────────────────────────────────────────────────────
  let statusPill;
  if (isSummarised) {
    // Summary exists — no pill needed, the content speaks for itself
    statusPill = '';
  } else if (hasContent) {
    statusPill = `<span class="status-pill awaiting">⏳ Awaiting summary</span>`;
  } else {
    statusPill = `<span class="status-pill unfetched">⚠ Not yet fetched</span>`;
  }

  // ── Rescue + Decline buttons — only shown when summary not yet available ────
  let rescueBtn = '';
  if (!isSummarised) {
    const alreadyDeclined = interaction === 'declined';
    const declineBtn = alreadyDeclined
      ? `<button class="btn-action btn-decline" disabled style="opacity:0.45">✗ Declined</button>`
      : `<button class="btn-action btn-decline" onclick="markArticle(${artId},'declined','${cardId}')">✗ Decline</button>`;
    if (isRescued) {
      rescueBtn = `<button class="btn-rescue rescued" disabled>⬆ Rescued</button>${declineBtn}`;
    } else {
      const rescueLabel = hasContent
        ? '⬆ Rescue — prioritise summary'
        : '⬆ Rescue — fetch & summarise';
      rescueBtn = `<button class="btn-rescue" id="rescue-btn-${artId}" onclick="rescueArticle(${artId})">${rescueLabel}</button>${declineBtn}`;
    }
  }

  const interactionBadge = interaction && interaction !== 'presented'
    ? `<span class="interaction-badge ${interaction}">${{read:'✓ Archived', skipped:'→ Skipped', declined:'✗ Declined'}[interaction] || interaction}</span>`
    : '';

  const rescuedBadge = isRescued
    ? `<span class="rescued-badge">⬆ Rescued</span>`
    : '';

  // ── Summary block — shown inline when available, collapsible ──────────────
  const summaryBlock = isSummarised && summary ? `
    <div class="card-body" style="margin-top:0.5rem">
      <div class="card-summary" id="sum-${cardId}"
           onclick="toggleExpand('${cardId}',${artId})">${escHtml(summary)}</div>
      <div class="card-images" id="imgs-${cardId}"></div>
      <span class="expand-hint" id="hint-${cardId}"
            onclick="toggleExpand('${cardId}',${artId})">expand ↓</span>
    </div>` : '';

  // Pre-load images if available
  if (isSummarised && a.images && a.images.length) {
    imageStore[artId] = parseImages(a.images);
  }

  return `
  <div class="article-card explore-card ${isRescued ? 'is-rescued' : ''}" id="${cardId}" style="animation-delay:${index * 0.03}s">
    <div class="card-header">
      <div style="flex:1;min-width:0;">
        <div class="card-meta">
          <span class="score-badge ${scoreClass}">${scoreLabel}</span>
          <span class="decay-badge decay-${decay}">${decayLabel}</span>
          ${a.category ? `<span class="category-tag">${escHtml(a.category)}</span>` : ''}
          <span class="age-tag">${age}</span>
          ${rescuedBadge}
          ${interactionBadge}
        </div>
        <div class="card-title">${title}</div>
      </div>
    </div>
    ${summaryBlock || (desc ? `<div class="explore-card-desc" style="padding:0 0 0.5rem">${desc}</div>` : '')}
    ${!isSummarised && reason ? `<div class="explore-card-reason">"${reason}"</div>` : ''}
    <div class="card-footer">
      ${rescueBtn}
      ${statusPill}
      ${isSummarised ? `
        <button class="btn-action btn-read"    onclick="markArticle(${artId},'read',    '${cardId}')">✓ Archive</button>
        <button class="btn-action btn-decline" onclick="markArticle(${artId},'declined','${cardId}')">✗ Decline</button>
        <button class="btn-full-article" id="full-btn-${artId}" onclick="openFullArticle(${artId}, this)">⊞ Full Article</button>
        ${summaryBlock ? `<button class="btn-speed-read" onclick="srOpen(document.getElementById('sum-${cardId}').innerHTML)">⚡ Speed Read</button>` : ''}
      ` : ''}
      <span class="footer-id-chip">#${artId}</span>
      <a href="${escHtml(a.url || '#')}" target="_blank" rel="noopener" class="btn-url">↗ Source</a>
    </div>
  </div>`;
}


async function rescueArticle(articleId) {
  const btn = document.getElementById(`rescue-btn-${articleId}`);
  if (!btn || btn.disabled) return;
  btn.disabled = true;
  btn.textContent = 'Rescuing…';

  try {
    const r = await authFetch(`${BASE}/rescue-article`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ article_id: articleId }),
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();

    // Update button
    btn.textContent = '⬆ Rescued';
    btn.classList.add('rescued');

    // Update the card appearance
    const card = document.getElementById(`ex-card-${articleId}`);
    if (card) {
      card.classList.add('is-rescued');
      // Inject rescued badge if not already there
      const meta = card.querySelector('.explore-card-meta');
      if (meta && !meta.querySelector('.rescued-badge')) {
        const badge = document.createElement('span');
        badge.className = 'rescued-badge';
        badge.textContent = '⬆ Rescued';
        meta.appendChild(badge);
      }
      // Update summary note
      const footer = card.querySelector('.explore-card-footer');
      if (footer) {
        const note = footer.querySelector('.unsummarised-note');
        if (note) {
          note.style.color = '';
          note.style.fontStyle = 'italic';
          note.textContent = data.is_summarised ? '✓ Summary ready' : 'Queued for summary…';
        }
        // Show full article button if already summarised
        if (data.is_summarised && !footer.querySelector('.btn-full-article')) {
          const fab = document.createElement('button');
          fab.className = 'btn-full-article';
          fab.textContent = '⊞ Full Article';
          fab.onclick = () => openFullArticle(articleId, fab);
          footer.insertBefore(fab, footer.querySelector('.btn-url'));
        }
      }
    }

    // Update in-memory result so re-renders reflect the rescue
    const result = exploreResults.find(a => (a.article_id || a.id) === articleId);
    if (result) {
      result.rescued_at = data.rescued_at;
      result.is_summarised = data.is_summarised;
    }

    showToast(data.is_summarised
      ? 'Article rescued — already summarised, check your Queue'
      : 'Article rescued — will appear in your Queue once summarised',
      'success');
  } catch(e) {
    console.error('Rescue error:', e);
    btn.disabled = false;
    btn.textContent = '⬆ Rescue';
    showToast('Rescue failed', 'error');
  }
}

// ── Jump to Queue (from Explore) ─────────────────────────────────────────────
function jumpToQueue() {
  // Rescued articles always appear in Top (no time window, pinned to top).
  setMode('top');
  switchTab('queue');
  // Brief scroll to top so the article is visible immediately
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

</script>
