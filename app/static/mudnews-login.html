<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MudNews — Sign in</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f12;
      color: #e0e0e8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #1a1a24;
      border: 1px solid #2a2a38;
      border-radius: 12px;
      padding: 2.5rem 2.2rem;
      width: 100%;
      max-width: 380px;
    }
    h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 1.8rem; color: #fff; }
    label { display: block; font-size: 0.82rem; color: #9090a8; margin-bottom: 0.35rem; }
    input {
      width: 100%; padding: 0.65rem 0.9rem;
      background: #0f0f18; border: 1px solid #2a2a38; border-radius: 7px;
      color: #e0e0e8; font-size: 1rem; margin-bottom: 1.2rem; outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #5050c8; }
    button {
      width: 100%; padding: 0.7rem; background: #4040b8; color: #fff;
      border: none; border-radius: 7px; font-size: 1rem; cursor: pointer;
      margin-top: 0.2rem; transition: background 0.15s;
    }
    button:hover { background: #5050c8; }
    button:disabled { opacity: 0.55; cursor: default; }
    .error {
      background: rgba(200,50,50,0.12); border: 1px solid rgba(200,50,50,0.3);
      color: #f08080; border-radius: 7px; padding: 0.6rem 0.9rem;
      font-size: 0.88rem; margin-bottom: 1.1rem; display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>MudNews</h1>
    <div class="error" id="err"></div>
    <form id="form" autocomplete="on">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" autocomplete="username" required>
      <label for="pw">Password</label>
      <input type="password" id="pw" name="password" autocomplete="current-password" required>
      <button type="submit" id="btn">Sign in</button>
    </form>
  </div>
  <script>
    const TOKEN_KEY = 'mudnews_token';
    if (localStorage.getItem(TOKEN_KEY)) window.location.replace('/mudnews/app');

    document.getElementById('form').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('btn');
      const err = document.getElementById('err');
      err.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Signing in…';
      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value.trim(),
            password: document.getElementById('pw').value,
          }),
        });
        const data = await res.json();
        if (!res.ok) {
          err.textContent = data.detail || 'Login failed.';
          err.style.display = 'block';
          return;
        }
        localStorage.setItem(TOKEN_KEY, data.access_token);
        window.location.replace('/mudnews/app');
      } catch {
        err.textContent = 'Network error — please try again.';
        err.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
